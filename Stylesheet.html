<style>
/* ════════════════════════════════════════════════════════
   FAMILY CHORES — Stylesheet
   Bright fun design: blue, yellow, red, green
════════════════════════════════════════════════════════ */

/* ── CSS Variables ──────────────────────────────────── */
:root {
  /* Blue (primary) */
  --blue-100: #e6f4ff;
  --blue-200: #bae0ff;
  --blue-300: #69b1ff;
  --blue-400: #1677ff;
  --blue-500: #0958d9;
  --blue-600: #003eb3;

  /* Yellow (accent) */
  --yellow-100: #feffe6;
  --yellow-200: #ffffb8;
  --yellow-300: #fff566;
  --yellow-400: #fadb14;
  --yellow-500: #d4b106;
  --yellow-600: #ad8b00;

  /* Red (action) */
  --red-100: #fff1f0;
  --red-200: #ffccc7;
  --red-400: #ff4d4f;
  --red-500: #f5222d;
  --red-600: #cf1322;

  /* Green (success) */
  --green-100: #f6ffed;
  --green-200: #d9f7be;
  --green-400: #52c41a;
  --green-500: #389e0d;
  --green-600: #237804;

  /* Kept for compatibility */
  --lavender:  #adc6ff;
  --mint:      #b7eb8f;
  --peach:     #ffd591;
  --sky:       #bae0ff;
  --lemon:     #fff566;

  --text-dark:  #001d66;
  --text-mid:   #003eb3;
  --text-light: #4096ff;
  --white:      #ffffff;
  --card-bg:    rgba(255,255,255,0.88);

  --radius-sm:  12px;
  --radius-md:  20px;
  --radius-lg:  28px;
  --radius-xl:  40px;

  --shadow-soft: 0 4px 20px rgba(22,119,255,0.12);
  --shadow-card: 0 8px 32px rgba(22,119,255,0.14);
  --shadow-hover:0 12px 40px rgba(22,119,255,0.26);
}

/* ── Reset & Base ────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, #e6f4ff 0%, #fffbe6 45%, #f6ffed 100%);
  min-height: 100vh;
  color: var(--text-dark);
  overflow-x: hidden;
}

/* ── Sparkles Background ─────────────────────────────── */
.sparkles-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.sparkle {
  position: absolute;
  font-size: 1.2rem;
  animation: floatSparkle linear infinite;
  opacity: 0.5;
}

@keyframes floatSparkle {
  0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.4; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* ── Header ─────────────────────────────────────────── */
.app-header {
  background: linear-gradient(135deg, var(--blue-400) 0%, var(--blue-600) 60%, #001d66 100%);
  padding: 1.5rem 1rem 1rem;
  text-align: center;
  position: relative;
  z-index: 10;
  box-shadow: 0 4px 20px rgba(0,62,179,0.35);
}

.header-inner { max-width: 700px; margin: 0 auto; }

.header-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
}

.logo-icon {
  font-size: 1.8rem;
  animation: wobble 2.5s ease-in-out infinite;
}
.logo-icon:last-child { animation-delay: 1.25s; }

@keyframes wobble {
  0%, 100% { transform: rotate(-8deg) scale(1); }
  50%       { transform: rotate(8deg)  scale(1.1); }
}

.logo-title {
  font-family: 'Pacifico', cursive;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  color: white;
  text-shadow: 2px 3px 8px rgba(0,0,0,0.2);
  letter-spacing: 1px;
}

.header-sub {
  color: rgba(255,255,255,0.88);
  font-size: 0.95rem;
  margin-top: 0.3rem;
  font-weight: 600;
}

/* ── Nav Tabs ────────────────────────────────────────── */
.tab-nav {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 0.4rem;
  padding: 0.9rem 0.8rem;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--blue-200);
  position: sticky;
  top: 0;
  z-index: 100;
}

.tab-btn {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  padding: 0.5rem 1rem;
  border: 2px solid var(--blue-300);
  border-radius: var(--radius-xl);
  background: var(--white);
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.25s ease;
  white-space: nowrap;
}

.tab-btn:hover {
  background: var(--blue-100);
  border-color: var(--blue-400);
  transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(22,119,255,0.2);
}

.tab-btn.active {
  background: linear-gradient(135deg, var(--blue-400), var(--blue-600));
  border-color: transparent;
  color: white;
  box-shadow: 0 4px 16px rgba(9,88,217,0.4);
  transform: translateY(-2px);
}

/* ── Main & Tabs ─────────────────────────────────────── */
.app-main {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem 1rem 4rem;
  position: relative;
  z-index: 1;
}

.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeSlideIn 0.35s ease; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Section Headers ─────────────────────────────────── */
.section-header {
  text-align: center;
  margin-bottom: 1.2rem;
}

.section-header h2 {
  font-size: clamp(1.3rem, 4vw, 1.7rem);
  font-weight: 900;
  color: var(--text-dark);
  text-shadow: 1px 1px 0 rgba(255,255,255,0.6);
}

.section-header h3 {
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--text-mid);
}

.section-sub {
  color: var(--text-light);
  font-size: 0.9rem;
  margin-top: 0.2rem;
  font-weight: 600;
}

.mt-2 { margin-top: 2rem; }
.mt-3 { margin-top: 2.5rem; }

/* ── Member Selector (Dashboard) ───────────────────────── */
.member-selector {
  display: flex;
  flex-wrap: wrap;
  gap: 0.8rem;
  justify-content: center;
  margin-bottom: 1.5rem;
}

.member-bubble {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.35rem;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.member-bubble:hover { transform: scale(1.1); }
.member-bubble.selected .bubble-ring { transform: scale(1.1); box-shadow: 0 0 0 3px var(--blue-400), 0 6px 20px rgba(22,119,255,0.35); }

.bubble-ring {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
  transition: all 0.2s ease;
  border: 3px solid rgba(255,255,255,0.7);
}

.bubble-name {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-mid);
}

/* ── Chore Grid & Cards ──────────────────────────────── */
.chore-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1rem;
  margin-bottom: 1rem;
}

.chore-card {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  padding: 1.1rem 1.2rem;
  box-shadow: var(--shadow-card);
  border: 2px solid rgba(255,255,255,0.8);
  cursor: pointer;
  transition: all 0.25s ease;
  backdrop-filter: blur(8px);
  position: relative;
  overflow: hidden;
}

.chore-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--blue-400), var(--yellow-400));
  border-radius: var(--radius-md) var(--radius-md) 0 0;
}

.chore-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.chore-card.done {
  opacity: 0.6;
  filter: grayscale(0.3);
}

.chore-card.done::before {
  background: linear-gradient(90deg, var(--green-400), var(--green-500));
}

.chore-card.pool-card::before {
  background: linear-gradient(90deg, var(--red-400), var(--yellow-400));
}

.chore-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}

.chore-title {
  font-weight: 800;
  font-size: 0.98rem;
  color: var(--text-dark);
  flex: 1;
  line-height: 1.3;
}

.chore-status-badge {
  font-size: 0.7rem;
  font-weight: 800;
  padding: 0.2rem 0.6rem;
  border-radius: var(--radius-xl);
  white-space: nowrap;
  flex-shrink: 0;
}

.badge-pending {
  background: var(--lemon);
  color: #875800;
}

.badge-done {
  background: #d9f7be;
  color: #237804;
}

.badge-pool {
  background: var(--sky);
  color: #003a8c;
}

.chore-desc {
  font-size: 0.82rem;
  color: var(--text-light);
  margin-bottom: 0.7rem;
  line-height: 1.4;
}

.chore-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.chore-meta-tag {
  font-size: 0.75rem;
  font-weight: 700;
  padding: 0.2rem 0.55rem;
  border-radius: var(--radius-xl);
  background: var(--blue-100);
  color: var(--blue-600);
}

.chore-meta-tag.points {
  background: var(--yellow-100);
  color: var(--yellow-600);
}

.chore-meta-tag.due {
  background: var(--lemon);
  color: #875800;
}

.chore-meta-tag.overdue {
  background: #fff1f0;
  color: #cf1322;
}

/* ── Empty State ─────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-light);
  grid-column: 1 / -1;
}

.empty-state .empty-icon { font-size: 3rem; margin-bottom: 0.5rem; }
.empty-state p { font-weight: 600; font-size: 0.95rem; }

/* ── Member Grid ─────────────────────────────────────── */
.member-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1rem;
}

.member-card {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  padding: 1.5rem 1rem;
  text-align: center;
  box-shadow: var(--shadow-card);
  border: 2px solid rgba(255,255,255,0.8);
  backdrop-filter: blur(8px);
  transition: transform 0.2s ease;
}

.member-card:hover { transform: translateY(-4px); }

.member-card-avatar {
  font-size: 2.8rem;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 0.6rem;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}

.member-card-name {
  font-weight: 900;
  font-size: 1.05rem;
  color: var(--text-dark);
}

.member-card-stats {
  font-size: 0.82rem;
  color: var(--text-light);
  margin-top: 0.4rem;
  font-weight: 600;
}

.member-card-pts {
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--red-500);
  margin-top: 0.4rem;
}

/* ── Leaderboard ─────────────────────────────────────── */
.leaderboard {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  padding: 1rem;
  box-shadow: var(--shadow-card);
  border: 2px solid rgba(255,255,255,0.8);
  backdrop-filter: blur(8px);
}

.leader-row {
  display: flex;
  align-items: center;
  gap: 0.9rem;
  padding: 0.7rem 0.5rem;
  border-bottom: 1px solid var(--pink-100);
  transition: background 0.2s;
  border-radius: var(--radius-sm);
}

.leader-row:last-child { border-bottom: none; }
.leader-row:hover { background: var(--blue-100); }

.leader-rank {
  font-size: 1.3rem;
  width: 2rem;
  text-align: center;
  font-weight: 900;
}

.leader-avatar {
  font-size: 1.6rem;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.leader-name {
  flex: 1;
  font-weight: 800;
  color: var(--text-dark);
}

.leader-pts {
  font-weight: 900;
  color: var(--red-500);
  font-size: 1.05rem;
}

.leader-bar-wrap {
  width: 80px;
  height: 8px;
  background: var(--blue-100);
  border-radius: 99px;
  overflow: hidden;
}

.leader-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--blue-400), var(--green-400));
  border-radius: 99px;
  transition: width 0.8s ease;
}

/* ── Filter Bar ──────────────────────────────────────── */
.filter-bar {
  display: flex;
  gap: 0.7rem;
  flex-wrap: wrap;
  margin-bottom: 1.2rem;
  justify-content: center;
}

/* ── Admin Cards ─────────────────────────────────────── */
.admin-card {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  padding: 1.5rem;
  box-shadow: var(--shadow-card);
  border: 2px solid rgba(255,255,255,0.8);
  margin-bottom: 1.5rem;
  backdrop-filter: blur(8px);
}

.admin-card h3 {
  font-size: 1.05rem;
  font-weight: 900;
  color: var(--text-dark);
  margin-bottom: 1rem;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 0.8rem;
  margin-bottom: 1rem;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}

.form-group label {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-mid);
}

/* ── Input Fields ────────────────────────────────────── */
.input-field {
  font-family: 'Nunito', sans-serif;
  font-size: 0.92rem;
  font-weight: 600;
  padding: 0.55rem 0.9rem;
  border: 2px solid var(--purple-200);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.9);
  color: var(--text-dark);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}

.input-field:focus {
  border-color: var(--pink-400);
  box-shadow: 0 0 0 3px rgba(247,89,171,0.15);
}

.emoji-input { font-size: 1.4rem; text-align: center; }

/* ── Color Picker ────────────────────────────────────── */
.color-picker-row {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: 0.2rem;
}

.color-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid transparent;
  transition: transform 0.2s, border-color 0.2s;
}

.color-dot:hover { transform: scale(1.2); }
.color-dot.selected { border-color: var(--text-dark); transform: scale(1.15); }

/* ── Buttons ─────────────────────────────────────────── */
.btn {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.9rem;
  padding: 0.6rem 1.3rem;
  border: none;
  border-radius: var(--radius-xl);
  cursor: pointer;
  transition: all 0.22s ease;
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  white-space: nowrap;
}

.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }

.btn-primary {
  background: linear-gradient(135deg, var(--pink-500), var(--purple-500));
  color: white;
  box-shadow: 0 4px 14px rgba(235,47,150,0.35);
}

.btn-primary:hover { box-shadow: 0 6px 20px rgba(235,47,150,0.5); }

.btn-secondary {
  background: linear-gradient(135deg, var(--sky), var(--lavender));
  color: var(--text-dark);
  box-shadow: 0 4px 14px rgba(147,82,222,0.2);
}

.btn-success {
  background: linear-gradient(135deg, #52c41a, #389e0d);
  color: white;
  box-shadow: 0 4px 14px rgba(56,158,13,0.35);
}

.btn-danger {
  background: linear-gradient(135deg, #ff7875, #f5222d);
  color: white;
  box-shadow: 0 4px 14px rgba(245,34,45,0.3);
}

.btn-sm {
  font-size: 0.78rem;
  padding: 0.35rem 0.8rem;
}

/* ── Admin List ──────────────────────────────────────── */
.admin-list { display: flex; flex-direction: column; gap: 0.6rem; }

.admin-list-item {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  padding: 0.65rem 0.9rem;
  background: rgba(255,255,255,0.6);
  border-radius: var(--radius-sm);
  border: 1px solid var(--blue-200);
}

.admin-list-item .item-info {
  flex: 1;
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--text-dark);
}

.admin-list-item .item-sub {
  font-size: 0.78rem;
  color: var(--text-light);
  font-weight: 600;
}

/* ── Modal ───────────────────────────────────────────── */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,29,102,0.45);
  backdrop-filter: blur(6px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  animation: fadeIn 0.2s ease;
}

.modal.hidden { display: none; }

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal-box {
  background: linear-gradient(160deg, #e6f4ff, #fffbe6);
  border-radius: var(--radius-lg);
  padding: 2rem 1.5rem;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,62,179,0.25);
  border: 2px solid rgba(255,255,255,0.9);
  position: relative;
  animation: slideUp 0.28s cubic-bezier(.34,1.56,.64,1);
}

@keyframes slideUp {
  from { transform: translateY(30px) scale(0.95); opacity: 0; }
  to   { transform: translateY(0)    scale(1);    opacity: 1; }
}

.modal-close {
  position: absolute;
  top: 0.8rem;
  right: 0.9rem;
  background: var(--red-200);
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  font-size: 0.8rem;
  cursor: pointer;
  color: var(--red-600);
  font-weight: 900;
  transition: background 0.2s;
}

.modal-close:hover { background: var(--red-400); color: white; }

.modal-emoji {
  font-size: 3rem;
  text-align: center;
  margin-bottom: 0.5rem;
  animation: bounceIn 0.4s ease;
}

@keyframes bounceIn {
  0%   { transform: scale(0); }
  60%  { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.modal-box h3 {
  font-size: 1.1rem;
  font-weight: 900;
  text-align: center;
  color: var(--text-dark);
  margin-bottom: 0.4rem;
}

.modal-desc {
  text-align: center;
  font-size: 0.88rem;
  color: var(--text-light);
  font-weight: 600;
  margin-bottom: 0.8rem;
}

.modal-meta {
  display: flex;
  justify-content: center;
  gap: 0.8rem;
  margin-bottom: 1.2rem;
}

.modal-meta span {
  font-size: 0.82rem;
  font-weight: 700;
  padding: 0.25rem 0.7rem;
  border-radius: var(--radius-xl);
  background: var(--yellow-100);
  color: var(--yellow-600);
}

.modal-prompt {
  font-weight: 800;
  font-size: 0.9rem;
  color: var(--text-mid);
  margin-bottom: 0.5rem;
  text-align: center;
}

.modal-actions {
  display: flex;
  gap: 0.7rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 1.2rem;
}

/* ── Toast ───────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--blue-400), var(--blue-600));
  color: white;
  padding: 0.7rem 1.5rem;
  border-radius: var(--radius-xl);
  font-weight: 800;
  font-size: 0.92rem;
  box-shadow: 0 8px 24px rgba(9,88,217,0.35);
  z-index: 9999;
  transition: opacity 0.35s ease;
}

.toast.hidden { opacity: 0; pointer-events: none; }

/* ── Loading Overlay ─────────────────────────────────── */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #e6f4ff, #fffbe6);
  z-index: 5000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  transition: opacity 0.4s ease;
}

.loading-overlay.hidden { opacity: 0; pointer-events: none; }

.loading-spinner {
  display: flex;
  gap: 0.5rem;
  font-size: 2rem;
}

.loading-spinner span {
  animation: spinBounce 1s ease-in-out infinite;
}
.loading-spinner span:nth-child(2) { animation-delay: 0.2s; }
.loading-spinner span:nth-child(3) { animation-delay: 0.4s; }

@keyframes spinBounce {
  0%, 100% { transform: translateY(0) scale(1); }
  50%       { transform: translateY(-16px) scale(1.3); }
}

.loading-overlay p {
  font-weight: 800;
  font-size: 1.1rem;
