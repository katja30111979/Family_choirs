<style>
/* ════════════════════════════════════════════════════════
   FAMILY CHORES — Autumn Leaves Theme
   Inspired by vibrant autumn foliage: warm oranges, deep
   reds, golden yellows, earthy browns. No moving elements.
════════════════════════════════════════════════════════ */

/* ── CSS Variables ──────────────────────────────────── */
:root {
  /* Warm Oranges (primary) */
  --orange-700: #7e5109;
  --orange-600: #d35400;
  --orange-500: #e8660d;
  --orange-400: #f0a500;
  --orange-300: #f4c27a;
  --orange-200: #fdebd0;
  --orange-100: #fef9f2;

  /* Deep Reds (accent) */
  --red-700:   #6e1010;
  --red-600:   #8b1a1a;
  --red-500:   #c0392b;
  --red-400:   #e05555;
  --red-200:   #f5b7b1;
  --red-100:   #fdedec;

  /* Golden Yellows */
  --gold-600:  #9a7d0a;
  --gold-500:  #d4ac0d;
  --gold-400:  #f1c40f;
  --gold-200:  #fdf2b0;
  --gold-100:  #fefde7;

  /* Earthy Browns */
  --brown-700: #3d1a08;
  --brown-600: #6b3a1f;
  --brown-500: #935116;
  --brown-400: #ba6a0a;
  --brown-200: #e59866;
  --brown-100: #fae5d3;

  /* Text */
  --text-dark:  #2c1a0e;
  --text-mid:   #7e5109;
  --text-light: #ba4a00;
  --white:      #ffffff;
  --card-bg:    rgba(255, 252, 245, 0.93);

  --radius-sm:  12px;
  --radius-md:  20px;
  --radius-lg:  28px;
  --radius-xl:  40px;

  --shadow-soft:  0 4px 20px rgba(126,81,9,0.12);
  --shadow-card:  0 8px 32px rgba(126,81,9,0.16);
  --shadow-hover: 0 12px 40px rgba(126,81,9,0.28);
}

/* ── Reset & Base ────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #fef9f2 0%, #fdebd0 40%, #fae5d3 70%, #f9e4c8 100%);
  min-height: 100vh;
  color: var(--text-dark);
  overflow-x: hidden;
}

/* ── Header ─────────────────────────────────────────── */
.app-header {
  background: linear-gradient(135deg, var(--red-600) 0%, var(--orange-500) 50%, var(--orange-400) 100%);
  padding: 1.5rem 1rem 1rem;
  text-align: center;
  position: relative;
  z-index: 10;
  box-shadow: 0 4px 24px rgba(110,16,16,0.35);
}

.header-inner { max-width: 700px; margin: 0 auto; }

.header-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
}

.logo-icon {
  font-size: 1.8rem;
  animation: wobble 2.5s ease-in-out infinite;
}
.logo-icon:last-child { animation-delay: 1.25s; }

@keyframes wobble {
  0%, 100% { transform: rotate(-8deg) scale(1); }
  50%       { transform: rotate(8deg)  scale(1.1); }
}

.logo-title {
  font-family: 'Pacifico', cursive;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  color: white;
  text-shadow: 2px 3px 8px rgba(0,0,0,0.25);
  letter-spacing: 1px;
}

.header-sub {
  color: rgba(255,255,255,0.90);
  font-size: 0.95rem;
  margin-top: 0.3rem;
  font-weight: 600;
}

/* ── Nav Tabs ────────────────────────────────────────── */
.tab-nav {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 0.4rem;
  padding: 0.9rem 0.8rem;
  background: rgba(255,252,245,0.90);
  backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--orange-200);
  position: sticky;
  top: 0;
  z-index: 100;
}

.tab-btn {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  padding: 0.5rem 1.1rem;
  border: 2px solid var(--orange-300);
  border-radius: var(--radius-xl);
  background: var(--white);
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.25s ease;
  white-space: nowrap;
}

.tab-btn:hover {
  background: var(--orange-100);
  border-color: var(--orange-500);
  transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(232,102,13,0.2);
}

.tab-btn.active {
  background: linear-gradient(135deg, var(--orange-500), var(--red-600));
  border-color: transparent;
  color: white;
  box-shadow: 0 4px 16px rgba(192,57,43,0.40);
  transform: translateY(-2px);
}

/* ── Main & Tabs ─────────────────────────────────────── */
.app-main {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem 1rem 4rem;
  position: relative;
}

.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeSlideIn 0.35s ease; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Section Headers ─────────────────────────────────── */
.section-header {
  text-align: center;
  margin-bottom: 1.2rem;
}

.section-header h2 {
  font-size: clamp(1.3rem, 4vw, 1.7rem);
  font-weight: 900;
  color: var(--red-600);
  text-shadow: 1px 1px 0 rgba(255,255,255,0.6);
}

.section-header h3 {
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--orange-600);
}

.section-header h4 {
  font-size: 0.95rem;
  font-weight: 800;
  color: var(--brown-500);
  margin-bottom: 0.6rem;
}

.section-sub {
  color: var(--orange-500);
  font-size: 0.9rem;
  margin-top: 0.2rem;
  font-weight: 600;
}

.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 2rem; }
.mt-3 { margin-top: 2.5rem; }

/* ── Member Selector (Dashboard) ───────────────────────── */
.member-selector {
  display: flex;
  flex-wrap: wrap;
  gap: 0.8rem;
  justify-content: center;
  margin-bottom: 1.5rem;
}

.member-bubble {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.35rem;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.member-bubble:hover { transform: scale(1.1); }
.member-bubble.selected .bubble-ring {
  transform: scale(1.1);
  box-shadow: 0 0 0 3px var(--orange-500), 0 6px 20px rgba(232,102,13,0.35);
}

.bubble-ring {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  box-shadow: 0 4px 14px rgba(0,0,0,0.12);
  transition: all 0.2s ease;
  border: 3px solid rgba(255,255,255,0.7);
  font-weight: 900;
  color: white;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}

.bubble-name {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--orange-600);
}

/* ── Points Progress Bar ─────────────────────────────── */
.points-progress-bar {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  padding: 0.9rem 1.2rem;
  box-shadow: var(--shadow-soft);
  border: 2px solid var(--orange-200);
  margin-bottom: 1.2rem;
  text-align: center;
}

.points-total {
  font-size: 1.15rem;
  font-weight: 900;
  color: var(--orange-600);
}

.points-next {
  font-size: 0.85rem;
  color: var(--text-mid);
  font-weight: 600;
  margin-top: 0.2rem;
}

/* ── Assign Panel ────────────────────────────────────── */
.assign-panel {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  padding: 1rem 1.2rem;
  box-shadow: var(--shadow-soft);
  border: 2px solid var(--gold-200);
  margin-bottom: 1.2rem;
}

.assign-panel h4 {
  font-size: 0.9rem;
  font-weight: 800;
  color: var(--brown-500);
  margin-bottom: 0.6rem;
}

.form-row {
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
  align-items: flex-end;
}

.form-row .input-field { flex: 1; min-width: 140px; }
.form-row .btn { flex-shrink: 0; }

/* ── Chore Grid & Cards ──────────────────────────────── */
.chore-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1rem;
  margin-bottom: 1rem;
}

.chore-card {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  padding: 1.1rem 1.2rem;
  box-shadow: var(--shadow-card);
  border: 2px solid rgba(255,255,255,0.8);
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

.chore-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--orange-500), var(--gold-400));
  border-radius: var(--radius-md) var(--radius-md) 0 0;
}

.chore-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.chore-card.done {
  opacity: 0.58;
  filter: grayscale(0.2);
}

.chore-card.done::before {
  background: linear-gradient(90deg, var(--brown-400), var(--brown-600));
}

.chore-card.general-card::before {
  background: linear-gradient(90deg, var(--gold-400), var(--orange-300));
}

.chore-card.permanent-card {
  border-color: var(--orange-300);
}

.chore-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}

.chore-title {
  font-weight: 800;
  font-size: 0.98rem;
  color: var(--brown-700);
  flex: 1;
  line-height: 1.3;
}

.chore-status-badge {
  font-size: 0.7rem;
  font-weight: 800;
  padding: 0.2rem 0.6rem;
  border-radius: var(--radius-xl);
  white-space: nowrap;
  flex-shrink: 0;
}

.badge-pending {
  background: var(--orange-200);
  color: var(--orange-700);
}

.badge-done {
  background: var(--gold-200);
  color: var(--gold-600);
}

.badge-general {
  background: var(--brown-100);
  color: var(--brown-600);
}

.chore-desc {
  font-size: 0.82rem;
  color: var(--brown-500);
  margin-bottom: 0.7rem;
  line-height: 1.4;
}

.chore-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.chore-meta-tag {
  font-size: 0.75rem;
  font-weight: 700;
  padding: 0.2rem 0.55rem;
  border-radius: var(--radius-xl);
  background: var(--orange-100);
  color: var(--orange-700);
}

.chore-meta-tag.points {
  background: var(--gold-100);
  color: var(--gold-600);
}

.chore-meta-tag.due {
  background: var(--orange-200);
  color: var(--orange-700);
}

.chore-meta-tag.overdue {
  background: var(--red-100);
  color: var(--red-600);
}

.chore-meta-tag.recurrence {
  background: var(--brown-100);
  color: var(--brown-600);
}

/* ── Empty State ─────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-light);
  grid-column: 1 / -1;
}

.empty-state .empty-icon { font-size: 3rem; margin-bottom: 0.5rem; }
.empty-state p { font-weight: 600; font-size: 0.95rem; }

.empty-hint {
  text-align: center;
  color: var(--text-mid);
  font-weight: 700;
  margin-bottom: 1rem;
}

/* ── Member Grid ─────────────────────────────────────── */
.member-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.member-card {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  padding: 1.5rem 1rem;
  text-align: center;
  box-shadow: var(--shadow-card);
  border: 2px solid rgba(255,255,255,0.8);
  transition: transform 0.2s ease;
}

.member-card:hover { transform: translateY(-4px); }

.member-card-avatar {
  font-size: 2.4rem;
  width: 68px;
  height: 68px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 0.6rem;
  box-shadow: 0 4px 14px rgba(0,0,0,0.12);
  font-weight: 900;
  color: white;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}

.member-card-name {
  font-weight: 900;
  font-size: 1.05rem;
  color: var(--brown-700);
}

.member-card-stats {
  font-size: 0.82rem;
  color: var(--brown-500);
  margin-top: 0.4rem;
  font-weight: 600;
}

.member-card-pts {
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--orange-600);
  margin-top: 0.4rem;
}

/* ── Leaderboard ─────────────────────────────────────── */
.leaderboard {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  padding: 1rem;
  box-shadow: var(--shadow-card);
  border: 2px solid rgba(255,255,255,0.8);
}

.leader-row {
  display: flex;
  align-items: center;
  gap: 0.9rem;
  padding: 0.7rem 0.5rem;
  border-bottom: 1px solid var(--orange-100);
  transition: background 0.2s;
  border-radius: var(--radius-sm);
}

.leader-row:last-child { border-bottom: none; }
.leader-row:hover { background: var(--orange-100); }

.leader-rank {
  font-size: 1.3rem;
  width: 2rem;
  text-align: center;
  font-weight: 900;
}

.leader-avatar {
  font-size: 1.4rem;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  color: white;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}

.leader-name {
  flex: 1;
  font-weight: 800;
  color: var(--brown-700);
}

.leader-pts {
  font-weight: 900;
  color: var(--orange-600);
  font-size: 1.05rem;
}

.leader-bar-wrap {
  width: 80px;
  height: 8px;
  background: var(--orange-100);
  border-radius: 99px;
  overflow: hidden;
}

.leader-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--orange-500), var(--red-500));
  border-radius: 99px;
  transition: width 0.8s ease;
}

/* ── Filter Bar ──────────────────────────────────────── */
.filter-bar {
  display: flex;
  gap: 0.7rem;
  flex-wrap: wrap;
  margin-bottom: 1.2rem;
  justify-content: center;
}

/* ── Admin Cards ─────────────────────────────────────── */
.admin-card {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  padding: 1.5rem;
  box-shadow: var(--shadow-card);
  border: 2px solid rgba(255,255,255,0.8);
  margin-bottom: 1.5rem;
}

.admin-card h3 {
  font-size: 1.05rem;
  font-weight: 900;
  color: var(--red-600);
  margin-bottom: 1rem;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 0.8rem;
  margin-bottom: 1rem;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}

.form-group label {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--orange-600);
}

/* ── Input Fields ────────────────────────────────────── */
.input-field {
  font-family: 'Nunito', sans-serif;
  font-size: 0.92rem;
  font-weight: 600;
  padding: 0.55rem 0.9rem;
  border: 2px solid var(--orange-200);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.92);
  color: var(--text-dark);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}

.input-field:focus {
  border-color: var(--orange-500);
  box-shadow: 0 0 0 3px rgba(232,102,13,0.18);
}

/* ── Color Picker ────────────────────────────────────── */
.color-picker-row {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: 0.2rem;
}

.color-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid transparent;
  transition: transform 0.2s, border-color 0.2s;
}

.color-dot:hover { transform: scale(1.2); }
.color-dot.selected { border-color: var(--text-dark); transform: scale(1.15); }

/* ── Buttons ─────────────────────────────────────────── */
.btn {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.9rem;
  padding: 0.6rem 1.3rem;
  border: none;
  border-radius: var(--radius-xl);
  cursor: pointer;
  transition: all 0.22s ease;
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  white-space: nowrap;
}

.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }

.btn-primary {
  background: linear-gradient(135deg, var(--orange-500), var(--red-600));
  color: white;
  box-shadow: 0 4px 14px rgba(192,57,43,0.35);
}
.btn-primary:hover { box-shadow: 0 6px 20px rgba(192,57,43,0.5); }

.btn-secondary {
  background: linear-gradient(135deg, var(--orange-200), var(--orange-300));
  color: var(--brown-700);
  box-shadow: 0 4px 14px rgba(126,81,9,0.15);
}

.btn-success {
  background: linear-gradient(135deg, var(--gold-400), var(--gold-600));
  color: white;
  box-shadow: 0 4px 14px rgba(154,125,10,0.35);
}
.btn-success:hover { box-shadow: 0 6px 20px rgba(154,125,10,0.5); }

.btn-danger {
  background: linear-gradient(135deg, var(--red-400), var(--red-700));
  color: white;
  box-shadow: 0 4px 14px rgba(110,16,16,0.3);
}

.btn-sm {
  font-size: 0.78rem;
  padding: 0.35rem 0.8rem;
}

/* ── Rewards Grid ────────────────────────────────────── */
.rewards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.reward-card {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  padding: 1rem 1.1rem;
  box-shadow: var(--shadow-card);
  border: 2px solid rgba(255,255,255,0.8);
  display: flex;
  align-items: center;
  gap: 0.8rem;
  transition: all 0.25s ease;
}

.reward-card.unlocked {
  border-color: var(--gold-400);
  background: linear-gradient(135deg, var(--gold-100), var(--card-bg));
}

.reward-card.locked {
  opacity: 0.72;
}

.reward-card.admin-reward {
  border-color: var(--orange-200);
}

.reward-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }

.reward-icon { font-size: 2rem; flex-shrink: 0; }

.reward-info { flex: 1; min-width: 0; }

.reward-title {
  font-weight: 900;
  font-size: 0.95rem;
  color: var(--brown-700);
  line-height: 1.2;
}

.reward-desc {
  font-size: 0.8rem;
  color: var(--brown-500);
  margin-top: 0.2rem;
  font-weight: 600;
}

.reward-pts {
  font-size: 0.8rem;
  font-weight: 800;
  color: var(--gold-600);
  margin-top: 0.3rem;
}

.locked-label {
  font-size: 0.75rem;
  font-weight: 800;
  color: var(--brown-400);
  white-space: nowrap;
}

/* ── Modal ───────────────────────────────────────────── */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(44,26,14,0.55);
  backdrop-filter: blur(6px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  animation: fadeIn 0.2s ease;
}

.modal.hidden { display: none; }

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal-box {
  background: linear-gradient(160deg, #fef9f2, #fdebd0);
  border-radius: var(--radius-lg);
  padding: 2rem 1.5rem;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(110,16,16,0.30);
  border: 2px solid rgba(255,255,255,0.9);
  position: relative;
  animation: slideUp 0.28s cubic-bezier(.34,1.56,.64,1);
}

@keyframes slideUp {
  from { transform: translateY(30px) scale(0.95); opacity: 0; }
  to   { transform: translateY(0)    scale(1);    opacity: 1; }
}

.modal-close {
  position: absolute;
  top: 0.8rem;
  right: 0.9rem;
  background: var(--red-100);
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  font-size: 0.8rem;
  cursor: pointer;
  color: var(--red-500);
  font-weight: 900;
  transition: background 0.2s;
}

.modal-close:hover { background: var(--red-400); color: white; }

.modal-emoji {
  font-size: 3rem;
  text-align: center;
  margin-bottom: 0.5rem;
  animation: bounceIn 0.4s ease;
}

@keyframes bounceIn {
  0%   { transform: scale(0); }
  60%  { transform: scale(1.2); }
