<script>
// ============================================================
// Family Chores — Client-Side JavaScript
// ============================================================

// ── App State ────────────────────────────────────────────
var state = {
  members:          [],
  chores:           [],
  points:           {},
  rewards:          [],
  redemptions:      [],
  selectedMember:   null,
  selectedColor:    '#e8660d',
  editSelectedColor:'#e8660d',
  editingChore:     null,
  editingMember:    null,
  activeModal:      null
};

var COLORS = [
  // Oranges & Golds
  '#e8660d','#d35400','#f0a500',
  // Yellows
  '#d4ac0d','#f1c40f','#f9ca24','#e6b800',
  // Greens
  '#27ae60','#2ecc71','#1abc9c','#6ab04c','#78e08f',
  // Reds & Browns
  '#8b1a1a','#c0392b','#784212','#935116',
  '#7e5109','#a04000'
];

// ── Init ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  buildColorPicker('colorPicker', 'selectedColor');
  bindNav();
  bindButtons();
  bindModal();
  bindFilters();
  bindChoreTypeToggle();
  loadAll();
});

// ── Color Picker ──────────────────────────────────────────
function buildColorPicker(containerId, stateKey) {
  var row = document.getElementById(containerId);
  if (!row) return;
  row.innerHTML = '';
  COLORS.forEach(function(c) {
    var dot = document.createElement('div');
    dot.className = 'color-dot' + (c === state[stateKey] ? ' selected' : '');
    dot.style.backgroundColor = c;
    dot.dataset.color = c;
    dot.addEventListener('click', function() {
      row.querySelectorAll('.color-dot').forEach(function(d){ d.classList.remove('selected'); });
      dot.classList.add('selected');
      state[stateKey] = c;
    });
    row.appendChild(dot);
  });
}

// ── Nav / Tabs ────────────────────────────────────────────
function bindNav() {
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
      document.querySelectorAll('.tab-content').forEach(function(t){ t.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    });
  });
}

// ── Load All Data ─────────────────────────────────────────
function loadAll(retryCount) {
  retryCount = retryCount || 0;
  showLoading(true);

  var safetyTimer = setTimeout(function() {
    showLoading(false);
    showToast('⚠️ Taking longer than expected — please refresh.');
  }, 12000);

  google.script.run
    .withSuccessHandler(function(result) {
      clearTimeout(safetyTimer);

      // If the server returned nothing, retry up to 2 times before giving up
      if (result == null) {
        if (retryCount < 2) {
          setTimeout(function() { loadAll(retryCount + 1); }, 1500);
        } else {
          showLoading(false);
          showToast('⚠️ Render error: no data returned from server. Please refresh.');
        }
        return;
      }

      try {
        state.members     = result.members     || [];
        state.chores      = result.chores      || [];
        state.points      = result.points      || {};
        state.rewards     = result.rewards     || [];
        state.redemptions = result.redemptions || [];
        renderAll();
      } catch(e) {
        showToast('⚠️ Render error: ' + e.message);
      }
      showLoading(false);
    })
    .withFailureHandler(function(err) {
      clearTimeout(safetyTimer);
      showToast('⚠️ Could not load data: ' + (err.message || err));
      showLoading(false);
    })
    .getAllData();
}

// ── Render All Views ──────────────────────────────────────
function renderAll() {
  renderDashMemberSelect();
  renderMembersTab();
  renderChoresTab();
  populateChoreForms();
  renderLeaderboard();
  renderRewardsList();
  if (state.selectedMember) {
    var m = state.members.find(function(m){ return m.id === state.selectedMember; });
    if (m) renderDashChores(m);
  }
}

// ── Dashboard: Member Bubbles ─────────────────────────────
function renderDashMemberSelect() {
  var wrap = document.getElementById('dashMemberCards');
  wrap.innerHTML = '';

  if (!state.members.length) {
    wrap.innerHTML = '<p class="empty-hint">No family members yet — add some in the Family tab! 💕</p>';
    return;
  }

  state.members.forEach(function(m) {
    var div = document.createElement('div');
    div.className = 'member-bubble' + (state.selectedMember === m.id ? ' selected' : '');
    div.innerHTML =
      '<div class="bubble-ring" style="background:' + safeStyle(m.color) + '">' + memberInitial(m.name) + '</div>' +
      '<span class="bubble-name">' + safeText(m.name) + '</span>';
    div.addEventListener('click', function() {
      state.selectedMember = m.id;
      document.querySelectorAll('.member-bubble').forEach(function(b){ b.classList.remove('selected'); });
      div.classList.add('selected');
      renderDashChores(m);
    });
    wrap.appendChild(div);
  });
}

function renderDashChores(member) {
  var area = document.getElementById('dashChoresArea');
  area.classList.remove('hidden');

  document.getElementById('dashMemberName').textContent = safeText(member.name) + "'s Chores";

  // Points progress bar
  var pts = state.points[member.id] || 0;
  var sortedRewards = state.rewards.slice().sort(function(a, b){ return a.pointsRequired - b.pointsRequired; });
  var nextReward = sortedRewards.find(function(r){ return r.pointsRequired > pts; });
  var dashBar = document.getElementById('dashPointsBar');
  dashBar.innerHTML =
    '<div class="points-total">⭐ ' + pts + ' points earned</div>' +
    (nextReward
      ? '<div class="points-next">Next reward: <strong>' + safeText(nextReward.title) + '</strong> at ⭐ ' + nextReward.pointsRequired + ' pts</div>'
      : (state.rewards.length ? '<div class="points-next">🎉 You can redeem rewards below!</div>' : '<div class="points-next">Keep earning points!</div>')
    );

  // Assigned chores for this member
  var assigned = state.chores.filter(function(c) {
    return c.assignedTo === member.id && c.status === 'pending';
  });
  renderChoreGrid('dashAssignedChores', assigned, false);

  // General (unassigned) chores
  var general = state.chores.filter(function(c) {
    return c.assignedTo === 'general' && c.status === 'pending';
  });
  renderChoreGrid('dashGeneralChores', general, true);

  // Populate the quick-assign dropdown
  var assignSelect = document.getElementById('assignChoreSelect');
  assignSelect.innerHTML = '<option value="">— Select a general chore —</option>';
  general.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = safeText(c.title) + ' (⭐' + (c.points || 5) + ')';
    assignSelect.appendChild(opt);
  });

  // Rewards for this member
  renderDashRewards(member, pts);
}

function renderDashRewards(member, pts) {
  var section = document.getElementById('dashRewardsSection');
  var grid    = document.getElementById('dashRewardsList');

  if (!state.rewards.length) {
    section.classList.add('hidden');
    return;
  }
  section.classList.remove('hidden');
  grid.innerHTML = '';

  state.rewards.forEach(function(r) {
    var canRedeem = pts >= r.pointsRequired;
    var card = document.createElement('div');
    card.className = 'reward-card' + (canRedeem ? ' unlocked' : ' locked');
    card.innerHTML =
      '<div class="reward-icon">' + (canRedeem ? '🎁' : '🔒') + '</div>' +
      '<div class="reward-info">' +
        '<div class="reward-title">' + safeText(r.title) + '</div>' +
        (r.description ? '<div class="reward-desc">' + safeText(r.description) + '</div>' : '') +
        '<div class="reward-pts">⭐ ' + r.pointsRequired + ' pts required</div>' +
      '</div>' +
      (canRedeem ? '<button class="btn btn-success btn-sm reward-redeem-btn" data-id="' + r.id + '">Redeem 🎉</button>' : '<span class="locked-label">🔒 ' + (r.pointsRequired - pts) + ' pts to go</span>');

    if (canRedeem) {
      card.querySelector('.reward-redeem-btn').addEventListener('click', function() {
        redeemRewardAction(r.id, member.id, r.title);
      });
    }
    grid.appendChild(card);
  });
}

// ── Chores Tab ────────────────────────────────────────────
function renderChoresTab() {
  applyChoreFilters();
}

function applyChoreFilters() {
  var memberFilter = document.getElementById('filterMember').value;
  var statusFilter = document.getElementById('filterStatus').value;
  var typeEl       = document.getElementById('filterType');
  var typeFilter   = typeEl ? typeEl.value : 'all';

  var filtered = state.chores.filter(function(c) {
    var memberOk = memberFilter === 'all' || c.assignedTo === memberFilter;
    var statusOk = statusFilter === 'all' || c.status === statusFilter;
    var typeOk   = typeFilter === 'all' || c.type === typeFilter;
    return memberOk && statusOk && typeOk;
  });

  renderChoreGrid('allChoresGrid', filtered, false);
}

// ── Chore Grid renderer ───────────────────────────────────
function renderChoreGrid(containerId, chores, isGeneral) {
  var grid = document.getElementById(containerId);
  if (!grid) return;
  grid.innerHTML = '';

  if (!chores.length) {
    grid.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">' + (isGeneral ? '🎯' : '🎉') + '</div>' +
        '<p>' + (isGeneral ? 'No general chores available!' : 'Nothing here — great job!') + '</p>' +
      '</div>';
    return;
  }

  chores.forEach(function(c) {
    var member    = state.members.find(function(m){ return m.id === c.assignedTo; });
    var isOverdue = c.dueDate && new Date(c.dueDate) < new Date() && c.status === 'pending';

    var card = document.createElement('div');
    card.className = 'chore-card' +
      (c.status === 'done'       ? ' done'         : '') +
      (c.assignedTo === 'general' ? ' general-card' : '') +
      (c.recurrence === 'permanent' ? ' permanent-card' : '');
    card.dataset.id = c.id;

    var badgeClass = c.status === 'done'
      ? 'badge-done'
      : (c.assignedTo === 'general' ? 'badge-general' : 'badge-pending');
    var badgeText = c.status === 'done'
      ? '✅ Done'
      : (c.assignedTo === 'general' ? '👥 General' : '⏳ Pending');

    var recurrenceBadge = c.recurrence === 'permanent'
      ? '<span class="chore-meta-tag recurrence">🔄 Permanent</span>'
      : '';

    var dueMeta = c.dueDate
      ? '<span class="chore-meta-tag ' + (isOverdue ? 'overdue' : 'due') + '">' +
          (isOverdue ? '🚨' : '📅') + ' ' + formatDate(c.dueDate) +
        '</span>'
      : '';

    var assigneeMeta = member
      ? '<span class="chore-meta-tag">👤 ' + safeText(member.name) + '</span>'
      : '<span class="chore-meta-tag">👥 General</span>';

    card.innerHTML =
      '<div class="chore-card-header">' +
        '<span class="chore-title">' + safeText(c.title) + '</span>' +
        '<span class="chore-status-badge ' + badgeClass + '">' + badgeText + '</span>' +
      '</div>' +
      (c.description ? '<p class="chore-desc">' + safeText(c.description) + '</p>' : '') +
      '<div class="chore-meta">' +
        '<span class="chore-meta-tag points">⭐ ' + (c.points || 5) + ' pts</span>' +
        assigneeMeta +
        dueMeta +
        recurrenceBadge +
      '</div>';

    card.addEventListener('click', function() { openChoreModal(c); });
    grid.appendChild(card);
  });
}

// ── Members Tab ───────────────────────────────────────────
function renderMembersTab() {
  var grid = document.getElementById('memberCards');
  grid.innerHTML = '';

  if (!state.members.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">👨‍👩‍👧</div><p>No members yet!</p></div>';
    return;
  }

  state.members.forEach(function(m) {
    var pts   = state.points[m.id] || 0;
    var total = state.chores.filter(function(c){ return c.assignedTo === m.id; }).length;
    var done  = state.chores.filter(function(c){ return c.assignedTo === m.id && c.status === 'done'; }).length;

    var card = document.createElement('div');
    card.className = 'member-card';
    card.innerHTML =
      '<div class="member-card-avatar" style="background:' + safeStyle(m.color) + '">' + memberInitial(m.name) + '</div>' +
      '<div class="member-card-name">' + safeText(m.name) + '</div>' +
      '<div class="member-card-stats">' + done + ' / ' + total + ' chores done</div>' +
      '<div class="member-card-pts">⭐ ' + pts + ' pts</div>' +
      '<button class="btn btn-secondary btn-sm member-edit-btn" style="margin-top:0.6rem">✏️ Edit</button>';

    card.querySelector('.member-edit-btn').addEventListener('click', function() {
      openEditMemberModal(m);
    });
    grid.appendChild(card);
  });
}

// ── Rewards List (Family tab) ─────────────────────────────
function renderRewardsList() {
  var grid = document.getElementById('rewardsList');
  grid.innerHTML = '';

  if (!state.rewards.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🎁</div><p>No rewards yet — add some above!</p></div>';
    return;
  }

  state.rewards.forEach(function(r) {
    var card = document.createElement('div');
    card.className = 'reward-card admin-reward';
    card.innerHTML =
      '<div class="reward-icon">🎁</div>' +
      '<div class="reward-info">' +
        '<div class="reward-title">' + safeText(r.title) + '</div>' +
        (r.description ? '<div class="reward-desc">' + safeText(r.description) + '</div>' : '') +
        '<div class="reward-pts">⭐ ' + r.pointsRequired + ' pts required</div>' +
      '</div>' +
      '<button class="btn btn-danger btn-sm reward-delete-btn" data-id="' + r.id + '">🗑️</button>';

    card.querySelector('.reward-delete-btn').addEventListener('click', function() {
      if (confirm('Delete this reward?')) { deleteRewardAction(r.id); }
    });
    grid.appendChild(card);
  });
}

// ── Leaderboard ───────────────────────────────────────────
function renderLeaderboard() {
  var board = document.getElementById('leaderboard');
  board.innerHTML = '';

  if (!state.members.length) {
    board.innerHTML = '<div class="empty-state"><div class="empty-icon">🏆</div><p>Add family members to start earning stars!</p></div>';
    return;
  }

  var sorted = state.members.slice().sort(function(a, b) {
    return (state.points[b.id] || 0) - (state.points[a.id] || 0);
  });

  var maxPts = Math.max(1, state.points[sorted[0].id] || 1);
  var medals = ['🥇','🥈','🥉'];

  sorted.forEach(function(m, i) {
    var pts = state.points[m.id] || 0;
    var pct = Math.round((pts / maxPts) * 100);

    var row = document.createElement('div');
    row.className = 'leader-row';
    row.innerHTML =
      '<div class="leader-rank">' + (medals[i] || (i + 1) + '.') + '</div>' +
      '<div class="leader-avatar" style="background:' + safeStyle(m.color) + '">' + memberInitial(m.name) + '</div>' +
      '<div class="leader-name">' + safeText(m.name) + '</div>' +
      '<div class="leader-bar-wrap"><div class="leader-bar" style="width:' + pct + '%"></div></div>' +
      '<div class="leader-pts">⭐ ' + pts + '</div>';
    board.appendChild(row);
  });
}

// ── Populate Chore Forms ──────────────────────────────────
function populateChoreForms() {
  var fm = document.getElementById('filterMember');
  var currentFilter = fm ? fm.value : 'all';
  if (fm) fm.innerHTML = '<option value="all">👨‍👩‍👧 All members</option>';

  var na = document.getElementById('newChoreAssign');
  if (na) na.innerHTML = '<option value="">— Select member —</option>';

  var ea = document.getElementById('editChoreAssign');
  if (ea) ea.innerHTML = '<option value="general">👥 General Pool</option>';

  state.members.forEach(function(m) {
    if (fm) fm.innerHTML += '<option value="' + m.id + '">' + safeText(m.name) + '</option>';
    if (na) na.innerHTML += '<option value="' + m.id + '">' + safeText(m.name) + '</option>';
    if (ea) ea.innerHTML += '<option value="' + m.id + '">' + safeText(m.name) + '</option>';
  });

  if (fm && currentFilter) fm.value = currentFilter;
}

// ── Chore Type Toggle (show/hide assign dropdown) ─────────
function bindChoreTypeToggle() {
  var typeSelect  = document.getElementById('newChoreType');
  var assignGroup = document.getElementById('newChoreAssignGroup');
  if (!typeSelect || !assignGroup) return;

  typeSelect.addEventListener('change', function() {
    assignGroup.style.display = (typeSelect.value === 'individual') ? '' : 'none';
  });
}

// ── Chore Action Modal ────────────────────────────────────
function openChoreModal(chore) {
  state.activeModal = chore;

  document.getElementById('modalEmoji').textContent =
    chore.status === 'done' ? '✅' : (chore.assignedTo === 'general' ? '🎯' : '🍂');
  document.getElementById('modalTitle').textContent = chore.title;
  document.getElementById('modalDesc').textContent  = chore.description || '';
  document.getElementById('modalPts').textContent   = '⭐ ' + (chore.points || 5) + ' pts';
  document.getElementById('modalDue').textContent   = chore.dueDate ? '📅 ' + formatDate(chore.dueDate) : '';

  var recEl = document.getElementById('modalRecurrence');
  if (recEl) recEl.textContent = chore.recurrence === 'permanent' ? '🔄 Permanent' : '';

  var claimSec    = document.getElementById('modalClaimSection');
  var completeSec = document.getElementById('modalCompleteSection');
  claimSec.classList.add('hidden');
  completeSec.classList.add('hidden');

  if (chore.status !== 'done') {
    if (chore.assignedTo === 'general') {
      claimSec.classList.remove('hidden');
      populateMemberSelect('modalClaimSelect');
    } else {
      completeSec.classList.remove('hidden');
      populateMemberSelect('modalCompleteSelect', chore.assignedTo);
    }
  }

  document.getElementById('choreModal').classList.remove('hidden');
}

function populateMemberSelect(selectId, preselect) {
  var sel = document.getElementById(selectId);
  sel.innerHTML = '';
  state.members.forEach(function(m) {
    var opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = m.name;
    if (preselect && m.id === preselect) opt.selected = true;
    sel.appendChild(opt);
  });
}

function bindModal() {
  document.getElementById('modalClose').addEventListener('click', closeChoreModal);
  document.getElementById('choreModal').addEventListener('click', function(e) {
    if (e.target === this) closeChoreModal();
  });

  document.getElementById('modalClaimBtn').addEventListener('click', function() {
    var memberId   = document.getElementById('modalClaimSelect').value;
    var recurrence = document.getElementById('modalClaimRecurrence').value;
    var chore      = state.activeModal;
    if (!memberId || !chore) return;

    showLoading(true);
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) {
          showToast('🙋 Chore claimed! Good luck! ✨');
          closeChoreModal();
          loadAll();
        } else {
          showLoading(false);
          showToast('⚠️ Could not claim chore. Please try again.');
        }
      })
      .withFailureHandler(handleError)
      .claimChore(chore.id, memberId, recurrence);
  });

  document.getElementById('modalCompleteBtn').addEventListener('click', function() {
    var memberId = document.getElementById('modalCompleteSelect').value;
    var chore    = state.activeModal;
    if (!memberId || !chore) return;

    showLoading(true);
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) {
          showToast('🎉 Amazing job! Points earned! ⭐');
          closeChoreModal();
          loadAll();
        } else {
          showLoading(false);
          showToast('⚠️ Could not mark chore done. Please try again.');
        }
      })
      .withFailureHandler(handleError)
      .completeChore(chore.id, memberId);
  });

  // Edit chore modal
  document.getElementById('editModalClose').addEventListener('click', closeEditModal);
  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
  });
  document.getElementById('saveEditBtn').addEventListener('click', saveEditChore);
  document.getElementById('deleteChoreBtn').addEventListener('click', deleteChoreFromEdit);

  // Edit member modal
  document.getElementById('editMemberClose').addEventListener('click', closeEditMemberModal);
  document.getElementById('editMemberModal').addEventListener('click', function(e) {
    if (e.target === this) closeEditMemberModal();
  });
  document.getElementById('saveEditMemberBtn').addEventListener('click', saveEditMember);
  document.getElementById('deleteMemberBtn').addEventListener('click', function() {
    var id = document.getElementById('editMemberId').value;
    var m  = state.members.find(function(m){ return m.id === id; });
    if (m && confirm('Remove ' + m.name + ' from the family? Their chores will remain.')) {
      closeEditMemberModal();
      deleteMemberAction(id);
    }
  });
}

function closeChoreModal() {
  document.getElementById('choreModal').classList.add('hidden');
  state.activeModal = null;
}

// ── Edit Chore Modal ──────────────────────────────────────
function openEditModal(chore) {
  state.editingChore = chore;
  document.getElementById('editChoreId').value     = chore.id;
  document.getElementById('editChoreTitle').value  = chore.title;
  document.getElementById('editChoreDesc').value   = chore.description || '';
  document.getElementById('editChorePoints').value = chore.points || 5;
  document.getElementById('editChoreDue').value    = chore.dueDate || '';

  populateChoreForms();

  var typeEl = document.getElementById('editChoreType');
  if (typeEl) typeEl.value = chore.type || 'individual';

  var assignEl = document.getElementById('editChoreAssign');
  if (assignEl) assignEl.value = chore.assignedTo || 'general';

  var recEl = document.getElementById('editChoreRecurrence');
  if (recEl) recEl.value = chore.recurrence || 'once';

  document.getElementById('editModal').classList.remove('hidden');
}

function closeEditModal() {
  document.getElementById('editModal').classList.add('hidden');
  state.editingChore = null;
}

function saveEditChore() {
  var id         = document.getElementById('editChoreId').value;
  var title      = document.getElementById('editChoreTitle').value.trim();
  var desc       = document.getElementById('editChoreDesc').value.trim();
  var type       = document.getElementById('editChoreType').value;
  var assign     = document.getElementById('editChoreAssign').value;
  var recurrence = document.getElementById('editChoreRecurrence').value;
  var points     = document.getElementById('editChorePoints').value;
  var due        = document.getElementById('editChoreDue').value;

  if (!title) { showToast('⚠️ Please enter a chore title!'); return; }

  var assignedTo = (type === 'general') ? 'general' : assign;
  if (type === 'individual' && !assignedTo) { showToast('⚠️ Please select a family member!'); return; }

  showLoading(true);
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.success) {
        showToast('✅ Chore updated!');
        closeEditModal();
        loadAll();
      } else {
        showLoading(false);
        showToast('⚠️ Could not update chore. Please try again.');
      }
    })
    .withFailureHandler(handleError)
    .updateChore(id, title, desc, assignedTo, points, due, type, recurrence);
}

function deleteChoreFromEdit() {
  var id = document.getElementById('editChoreId').value;
  if (!confirm('Delete this chore? This cannot be undone.')) return;

  showLoading(true);
  google.script.run
    .withSuccessHandler(function() {
      showToast('🗑️ Chore deleted.');
      closeEditModal();
      loadAll();
    })
    .withFailureHandler(handleError)
    .deleteChore(id);
}

// ── Edit Member Modal ─────────────────────────────────────
function openEditMemberModal(member) {
  state.editingMember    = member;
  state.editSelectedColor = member.color;
  document.getElementById('editMemberId').value   = member.id;
  document.getElementById('editMemberName').value = member.name;
  buildColorPicker('editColorPicker', 'editSelectedColor');
  document.getElementById('editMemberModal').classList.remove('hidden');
}

function closeEditMemberModal() {
  document.getElementById('editMemberModal').classList.add('hidden');
  state.editingMember = null;
}

function saveEditMember() {
  var id    = document.getElementById('editMemberId').value;
  var name  = document.getElementById('editMemberName').value.trim();
  var color = state.editSelectedColor;
  if (!name) { showToast('⚠️ Please enter a name!'); return; }

  showLoading(true);
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.success) {
        showToast('✅ Member updated!');
        closeEditMemberModal();
        loadAll();
      } else {
        showLoading(false);
        showToast('⚠️ Could not update member.');
      }
    })
    .withFailureHandler(handleError)
    .updateMember(id, name, color);
}

// ── Bind Buttons ──────────────────────────────────────────
function bindButtons() {
  document.getElementById('addMemberBtn').addEventListener('click', addMember);
  document.getElementById('addChoreBtn').addEventListener('click', addChore);
  document.getElementById('addRewardBtn').addEventListener('click', addRewardAction);
  document.getElementById('assignChoreBtn').addEventListener('click', assignChoreToMember);
}

// ── Add Member ────────────────────────────────────────────
function addMember() {
  var name  = document.getElementById('newMemberName').value.trim();
  var color = state.selectedColor;
  if (!name) { showToast('⚠️ Please enter a name!'); return; }

  showLoading(true);
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.success) {
        showToast('🍂 ' + name + ' added to the family!');
        document.getElementById('newMemberName').value = '';
        loadAll();
      } else {
        showLoading(false);
        showToast('⚠️ Could not add member. Please try again.');
      }
    })
    .withFailureHandler(handleError)
    .addMember(name, '', color);
}

function deleteMemberAction(id) {
  showLoading(true);
  google.script.run
    .withSuccessHandler(function() {
      showToast('👋 Member removed.');
      loadAll();
    })
    .withFailureHandler(handleError)
    .deleteMember(id);
}

// ── Add Chore ─────────────────────────────────────────────
function addChore() {
  var title      = document.getElementById('newChoreTitle').value.trim();
  var desc       = document.getElementById('newChoreDesc').value.trim();
  var type       = document.getElementById('newChoreType').value;
  var assign     = document.getElementById('newChoreAssign').value;
  var recurrence = document.getElementById('newChoreRecurrence').value;
  var points     = document.getElementById('newChorePoints').value;
  var due        = document.getElementById('newChoreDue').value;

  if (!title) { showToast('⚠️ Please enter a chore title!'); return; }

  var assignedTo;
  if (type === 'general') {
    assignedTo = 'general';
  } else {
    if (!assign) { showToast('⚠️ Please select a family member!'); return; }
    assignedTo = assign;
  }

  showLoading(true);
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.success) {
        showToast('🌱 Chore added!');
        document.getElementById('newChoreTitle').value  = '';
        document.getElementById('newChoreDesc').value   = '';
        document.getElementById('newChorePoints').value = '5';
        document.getElementById('newChoreDue').value    = '';
        loadAll();
      } else {
        showLoading(false);
        showToast('⚠️ Could not add chore. Please try again.');
      }
    })
    .withFailureHandler(handleError)
    .addChore(title, desc, assignedTo, points, due, type, recurrence);
}

// ── Assign Chore from Home tab ────────────────────────────
function assignChoreToMember() {
  var choreId    = document.getElementById('assignChoreSelect').value;
  var recurrence = document.getElementById('assignRecurrence').value;
  var memberId   = state.selectedMember;

  if (!choreId)  { showToast('⚠️ Please select a chore to assign!'); return; }
  if (!memberId) { showToast('⚠️ Please select a family member first!'); return; }

  showLoading(true);
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.success) {
        showToast('✅ Chore assigned!');
        loadAll();
      } else {
        showLoading(false);
        showToast('⚠️ Could not assign chore.');
      }
    })
    .withFailureHandler(handleError)
    .claimChore(choreId, memberId, recurrence);
}

// ── Rewards ───────────────────────────────────────────────
function addRewardAction() {
  var title  = document.getElementById('newRewardTitle').value.trim();
  var desc   = document.getElementById('newRewardDesc').value.trim();
  var points = document.getElementById('newRewardPoints').value;
  if (!title) { showToast('⚠️ Please enter a reward title!'); return; }

  showLoading(true);
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.success) {
        showToast('🎁 Reward added!');
        document.getElementById('newRewardTitle').value  = '';
        document.getElementById('newRewardDesc').value   = '';
        document.getElementById('newRewardPoints').value = '50';
        loadAll();
      } else {
        showLoading(false);
        showToast('⚠️ Could not add reward.');

function deleteRewardAction(id) {
  showLoading(true);
  google.script.run
    .withSuccessHandler(function() {

      loadAll();
    })
    .withFailureHandler(handleError)

function redeemRewardAction(rewardId, memberId, rewardTitle) {
  if (!confirm('Redeem "' + rewardTitle + '"? This will be logged!')) return;

  showLoading(true);
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.success) {
        showToast('🎉 Reward redeemed! Enjoy! 🌟');

      } else {
        showLoading(false);
        showToast('⚠️ ' + (res.error || 'Could not redeem reward.'));

// ── Filters ────────────────────────────────────────────────
function bindFilters() {
  document.getElementById('filterMember').addEventListener('change', applyChoreFilters);
  document.getElementById('filterStatus').addEventListener('change', applyChoreFilters);
  var filterType = document.getElementById('filterType');
  if (filterType) filterType.addEventListener('change', applyChoreFilters);
}

// ── Helpers ───────────────────────────────────────────────
function showLoading(on) {
  document.getElementById('loadingOverlay').classList.toggle('hidden', !on);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function() { t.classList.add('hidden'); }, 3200);
}

function handleError(err) {
  showLoading(false);
  showToast('⚠️ Error: ' + (err.message || err));
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function memberInitial(name) {
  var ch = (name && String(name).trim().charAt(0)) || '?';
  return safeText(ch.toUpperCase());
}

// Prevent XSS when inserting user data into innerHTML
function safeText(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Validate colour values before using in style attributes
function safeStyle(color) {
  if (!color) return '#e8660d';
  if (/^#[0-9a-fA-F]{3,8}$/.test(color)) return color;
  if (/^[a-zA-Z]+$/.test(color)) return color;
  return '#e8660d';
}
